      <h1>Рішення задачі №14</h1>
      <p>Каса. Користувачу повідомляють суму, яку йому треба сплатити. Користувач поступово вводить суму грошей до тих
         пір, поки суми не буде достатньо для оплати товарів (кожного разу користувачу повідомляють, яку ще суму
         потрібно ввести).</p>
      <p>Рішення:</p>
      <script>
         const min = 1000, max = 10000
         let price = min + Math.floor(Math.random() * (max - min + 1))
         alert(`Ціна товару: ${price}, внесіть кошти!`)
         let payment
         while (price > 0) {
            payment = (parseInt(prompt(`Залишилось внести ${price} грн`)))
            price = price - payment
         }
         alert('Ви внесли достатньо коштів!')
      </script>
