   <body>
      <h1>Рішення задачі №11</h1>
      <p>Знайти суму 5 непарних чисел, що знаходяться між заданими користувачем числами.</p>
      <p>Рішення:</p>
      <script>
         const bottomNumber = parseFloat(prompt('Введіть число нижнього діапазону'))
         const topNumber = parseFloat(prompt('Введіть число верхнього діапазону'))
         const cycle = topNumber - bottomNumber - 1
         let number = bottomNumber
         let result = 0
         let numberOfNumber = 0
         console.log(`Цикл = ${cycle}`)
         for (let i = 1; i <= cycle; i++) {
            if (numberOfNumber >= 5) {
               break
            }
            number++
            if (number % 2 !== 0) {
               result = result + number
               console.log(`крок = ${number}`)
               numberOfNumber++
            }
         }
         alert(`Сума перших непарних чисел в заданому діапазоні = ${result}`)
         document.write(`Сума перших непарних чисел в заданому діапазоні = ${result}<br>`)
         if (numberOfNumber < 5) {
            document.write(`Недостатній діапазон для підрахунку результату з п'яти чисел, пораховано чисел = ${numberOfNumber}!`)
         }

         console.log(`Результат = ${result}`)
      </script>
      <a href="task11.html">
         <p>Перезапустити</p>
      </a>
      <a href="../index.html"> 👈 Назад</a>
   </body>
