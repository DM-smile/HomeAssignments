   <body>
      <h1>Рішення задачі №10</h1>
      <p>Знайти суму всіх непарних чисел, що знаходяться між заданими користувачем числами.</p>
      <p>Рішення:</p>
      <script>
         const bottomNumber = parseFloat(prompt('Введіть число нижнього діапазону'))
         const topNumber = parseFloat(prompt('Введіть число верхнього діапазону'))
         const cycle = topNumber - bottomNumber - 1
         let number = bottomNumber
         let result = 0
         console.log(`Цикл = ${cycle}`)
         for (let i = 1; i <= cycle; i++) {
            number++
            if (number % 2 !== 0) {
               result = result + number
               console.log(`крок = ${number}`)
            }
         }
         alert(`Сума всіх непарних чисел в заданому діапазоні = ${result}`)
         document.write(`Сума всіх непарних чисел в заданому діапазоні = ${result}`)
         console.log(`Результат = ${result}`)
      </script>

         <p>Перезапустити</p>
      </a>

   </body>
