   <body>
      <h1>Рішення задачі №9</h1>
      <p>Дано історію цін на цінні папери за деякий період (згенерувати від 1 до 10000)</p>
      <p>Підрахувати суму цін, що більше за 1000</p>
      <p>Рішення:</p>
      <script>
         // ======== Генерація масиву цін ========
         let historyPrices = createHistoryPrices(1, 10000, 15)
         function createHistoryPrices(minPrice, maxPrice, length) {
            let newPrice = []
            for (i = 0; i < length; i++) {
               newPrice.push(minPrice + Math.floor(Math.random() * (maxPrice)))
            }
            return newPrice
         }
         document.write(`Дано базовий масив з ${historyPrices.length}-и цін:<br> ${historyPrices} <br><br>`)

         // ======== рішення задачі =======
         let sumOfPrices = historyPrices.reduce(
            (sum, price) => price > 1000 ? sum += price : sum
         )
         // =============================== //
         document.write(`Cума цін, що більше за 1000:<br> ${sumOfPrices}`)
      </script>
