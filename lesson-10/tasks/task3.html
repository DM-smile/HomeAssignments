   <body>
      <h1>Рішення задачі №3</h1>
      <p>Дано історію цін на цінні папери за деякий період (згенерувати від 1 до 10000)</p>
      <p>Сформувати список з тих цін, які більші за попереднє значення</p>
      <p>Рішення:</p>
      <script>
         // ======== Генерація масиву цін ========
         let historyPrices = createHistoryPrices(1, 10000, 20)
         function createHistoryPrices(minPrice, maxPrice, length) {
            let newPrice = []
            for (i = 0; i < length; i++) {
               newPrice.push(minPrice + Math.floor(Math.random() * (maxPrice)))
            }
            return newPrice
         }
         document.write(`Дано базовий масив з ${historyPrices.length}-и цін:<br> ${historyPrices} <br><br>`)

         // ======== рішення задачі =======
         document.write('Сформований список з тих цін, які більші за попереднє значення:')
         document.write('<ul>')

         historyPrices.forEach(
            (price, ind) => {
               if (ind === 0 || price > historyPrices[ind - 1]) document.write(`<li>${price}</li>`)
            }
         )

         document.write('</ul>')
      </script>
