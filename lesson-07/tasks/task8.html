<!DOCTYPE html>
<html lang="en">

   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="shortcut icon" href="/../../img/icons/favicon.png" type="image/x-icon">
      <title>Рішення задачі №8</title>
      <style>
         img {
            max-width: 600px;
            height: auto;
            border-radius: 20px;
            transition: all 0.2s;
         }

         img:hover {
            box-shadow: 5px 5px 5px black;
         }
      </style>
   </head>

   <body>
      <h1>Рішення задачі №8</h1>
      <p>Створити функцію, яка виводить банер (у функцію передаються: зображення, заголовок та посилання, куди
         переходимо при кліку на зображення (тег img повине знаходитись у середині тега a: "<a> <img src="шлях">
         </a>"</p>
      <p>Рішення:</p>
      <script>
         function banner(title, photo, link) {
            document.write(`<h1>${title}</h1>`)
            document.write(`<a href="${link}"><img src=${photo} alt="photo" title="клацни на мене"></a>`)
         }
         let title = prompt('Введи заголовок', 'Тварини')
         let photo = prompt('Введи адресу зображення', '"../img/1.jpg"')
         let link = prompt('Введи адресу посилання', 'https://uk.wikipedia.org/wiki/%D0%A2%D0%B2%D0%B0%D1%80%D0%B8%D0%BD%D0%B8')
         let result = banner(title, photo, link)
      </script>
      <a href="task8.html">
         <p>Перезапустити</p>
      </a>
      <a href="../index.html"> 👈 Назад</a>
   </body>
