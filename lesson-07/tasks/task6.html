      <p>Створити функцію, яка створює таблицю з вказаною кількістю рядків і стовпців (таблиця заповнюється заданим
         фіксованим повідомленням).</p>
      <p>Рішення:</p>
      <script>
         document.write('<table>')
         function table(rows, columns, messages) {

            for (let newRow = 1; newRow <= rows; newRow++) {
               document.write('<tr>')
               for (let newColumn = 1; newColumn <= columns; newColumn++) {
                  document.write(`<td>${messages}</td>`)
               }
               document.write('</tr>')
            }
            document.write('</table>')
         }

         const row = parseInt(prompt('Введіть кількість рядків таблиці', '6'))
         const column = parseInt(prompt('Введіть кількість колонок таблиці', '5'))
         const message = prompt('Введіть повідомлення', 'Hello, World!')
