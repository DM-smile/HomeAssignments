      <h1>Рішення задачі №9</h1>
      <p>Дано покази температур (довільна кількість). Розробити функцію, яка дозволить підрахувати кількість від’ємних
         показів температури.</p>
      <p>Рішення:</p>
      <script>
         function testTemp() {
            let negativeTemp = 0
            for (let i = 1; i <= 5; i++) {
               let temp = parseInt(prompt(`Введи замір температури №${i} (всього замірів 5)`))
               if (temp < 0)
                  negativeTemp++
               console.log(`замір №${i}: ${temp} градусів`)
            }
            document.write('Зроблено 5 замірів температури <br>')
            document.write(`Від'ємних показів: ${negativeTemp}<br>`)
            console.log(`від'ємних показів: ${negativeTemp}`)
         }

         testTemp()

      </script>
