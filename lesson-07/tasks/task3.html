   <body>
      <h1>Рішення задачі №3</h1>
      <p>Створити окремі функції, які для 4 чисел знаходять: <br> 1) суму; <br> 2) добуток; <br>3) середнє арифметичне;
         <br> 4) мінімальне значення. </p>
      <p>Рішення:</p>
      <script>
         let num1, num2, num3, num4
         num1 = parseFloat(prompt('Введи перше число'))
         num2 = parseFloat(prompt('Введи друге число'))
         num3 = parseFloat(prompt('Введи третє число'))
         num4 = parseFloat(prompt('Введи четверте число'))

         function calcSum(a, b, c, d) {
            let sum = a + b + c + d
            return sum
         }
         function calcProduct(a, b, c, d) {
            let product = a * b * c * d
            return product
         }
         function calcAverage(a, b, c, d) {
            let average = (a + b + c + d) / 4
            return average
         }

         let result = (`Сума = ${calcSum(num1, num2, num3, num4)}<br> Добуток = ${calcProduct(num1, num2, num3, num4)}<br> Середнє арифметичне = ${calcAverage(num1, num2, num3, num4)}`)
         document.write(`${result}`)
      </script>

         <p>Перезапустити</p>
      </a>

   </body>
