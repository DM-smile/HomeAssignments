<!DOCTYPE html>
<html lang="en">

   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="shortcut icon" href="/../../img/icons/favicon.png" type="image/x-icon">
      <title>Рішення задачі №3</title>
   </head>

   <body>
      <h1>Рішення задачі №3</h1>
      <p>Дано вартість одиниці товару і кількість. Знайти загальну вартість та ПДВ (5% від загальної вартості). </p>
      <script>
         let a = parseFloat(prompt('Вкажи вартість товара  за одиницю в грн', '150'))
         let b = parseFloat(prompt('Вкажи кількість товару для підрахунку ціни', '2'))
         let sum = a * b
         let vat = sum / 100 * 5
         let rez = sum + vat
         document.write(`<p>Рішення:</p>`)
         document.write(`<p>Відомо що вартість товара за одиницю ${a} грн</p>`)
         document.write(`<p>Кількість товару ${b} одиниць</p>`)
         document.write(`<p>Отримуємо загальну вартість товару ${sum} грн</p>`)
         document.write(`<p>Додатково до вартості ${vat} грн ПДВ (що є 5% від загальної вартості)</p>`)
         document.write(`<p>Загальна вартість товару з ПДВ складає: ${rez} грн</p>`)
      </script>
      <a href="../index.html"> 👈 Назад</a>
   </body>

</html>
