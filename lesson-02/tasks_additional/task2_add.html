      <h1>Рішення додаткової задачі №2</h1>
      <p>З клавіатури вводиться кількість монет номіналом 1 копійка. Визначити скільки гривень і копійок є у даній сумі.
         Наприклад, дано 245 копійок, а вивести 2 грн 45 копійок.</p>
      <p>Рішення:</p>
      <script>
         alert('З клавіатури вводиться кількість монет номіналом 1 копійка. Визначити скільки гривень і копійок є у даній сумі.')
         const cop = parseFloat(prompt('Введіть кількість копійок для підрахунку', '425'))
         const uah = cop / 100
         const remain = cop % 100
         uah = uah.toFixed(0)
         alert(`Маємо ${cop} копійок. В гривнях це ${uah} гривень, ${remain} копійок`)
         document.write(`Маємо ${cop} копійок. В гривнях це ${uah}грн. ${remain}коп.`)
      </script>

         <p>Ввести дані ще раз</p>
      </a>

   </body>
