   <body>
      <h1>Рішення додаткової задачі №1</h1>
      <p>Дано ширину екрана та кількість елементів, які повинні бути відображені у рядку. Визначити ширину елементів,
         які повинні бути відображені у цьому рядку.</p>
      <p>Рішення:</p>
      <script>
         alert('Дано ширину екрана та кількість елементів, які повинні бути відображені у рядку. Визначити ширину елементів, які повинні бути відображені у цьому рядку.')
         const width = parseFloat(prompt('введіть ширину екрану в пікспелях', '1920px'))
         const quantity = parseFloat(prompt(`Введіть кількість елементів, які потрібно розмістити в рядок в указаній ширині екрану ${width}px`, '4'))
         const result = width / quantity
         document.write(`<p>Вказана ширина: ${width}px!</p>`)
         document.write(`<p>Вказана бажана кількість елементів: ${quantity}!</p>`)
         alert(`Ширина елементів повинна бути не більше ніж ${result}px щоб розмістити їх шинині екрану ${width}px!`)
         document.write(`<p>Ширина елементів повинна бути не більше ніж ${result}px щоб розмістити їх шинині екрану ${width}px!</p>`)
      </script>

         <p>Ввести дані ще раз</p>
      </a>

   </body>
