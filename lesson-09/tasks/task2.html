   <body>
      <h1>Рішення задачі №2</h1>
      <p>Користувач вводить кількість елементів. Створити масив, у якому перша половина заповнена 1-цями, а друга
         заповнена 7-ками.</p>
      <script>
         const elementNumber = parseInt(prompt('Введіть кількість елементів', '20'))
         let createArray = new Array(elementNumber).fill(1, 0, (elementNumber / 2)).fill(7, (elementNumber / 2))
         document.write(`Введено кількість елементів: ${elementNumber}<br>${createArray}<br>`)
      </script>
