   <body>
      <h1>Рішення додаткової задачі №1</h1>
      <p>Інвестор вклав S тис. грн на 20 років під 20% річних. Визначити за допомогою циклів суму, яку він одержить (без
         оподаткування).</p>
      <p>Рішення:</p>
      <p>Рішення:</p>
      <script>
         const quantityYears = 20
         const investment = parseFloat(prompt(`Введіть суму інвестиції на ${quantityYears} років`, '100'))
         const parsentage = 20
         let totalParsentage = 0
         let totalSum = investment + totalParsentage
         console.log(`інвестиція ${investment} грн`)
         console.log(`на ${quantityYears} років`)
         console.log(`під ${parsentage}% річних`)

         for (i = 1; i <= quantityYears; i++) {
            currentParsent = totalSum / 100 * parsentage
            totalParsentage = totalParsentage + currentParsent
            totalSum = totalSum + currentParsent
            console.log(`за ${i} рік нараховано відсотків = ${currentParsent.toFixed(2)} грн`)
         }

         console.log(`сумарна кількість відсотків = ${totalParsentage.toFixed(2)} грн`)
         console.log(`загальна сума виплати = ${totalSum.toFixed(2)} грн`)

         alert(`Банк прийняв депозит ${investment} грн під ${parsentage}% річних на ${quantityYears} років \nКількість накопичених відсотків за весь період = ${totalParsentage.toFixed(2)} грн \nЗагальна сума виплати після закінчання періоду = ${totalSum.toFixed(2)} грн \nПідраховано за умовою поступового додавання накопичених відсотків до загальної суми депозиту`)
         document.write(`Банк прийняв депозит ${investment} грн під ${parsentage}% річних на ${quantityYears} років<br> Кількість накопичених відсотків за весь період = ${totalParsentage.toFixed(2)} грн<br> Загальна сума виплати після закінчання періоду = ${totalSum.toFixed(2)} грн<br> Підраховано за умовою поступового додавання накопичених відсотків до загальної суми депозиту`)
      </script>
