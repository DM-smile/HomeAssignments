<!DOCTYPE html>
<html lang="en">

   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Рішення задачі №3</title>
   </head>

   <body>
      <h1>Рішення задачі №3</h1>
      <p>Випадковим чином генерується число від 1 до 5. Спробуйте вгадати число за 2 спроби.</p>
      <p>Граємо:</p>
      <script>
         alert('Давай зіграємо в гру! Я загадав число від 1 до 5, твоя задача за дві спроби його вгадати, готовий?')
         const minNumber = 1, maxNumber = 5
         const randomNumber = minNumber + Math.floor(Math.random() * (maxNumber - minNumber + 1))
         const numberOne = parseInt(prompt('Введи число від 1 до 5'))
         if (numberOne === randomNumber) {
            alert('Молодець! Ти вгадав з першої спроби')
            document.write(`Молодець! Ти вгадав з першої спроби! Я загадав число ${randomNumber}`)
         }
         else if (numberOne !== randomNumber) {
            const numberTwo = parseInt(prompt('Не вгадав! Повторна спроба! Введи число від 1 до 5'))
            if (numberTwo === randomNumber) {
               alert('Молодець! Ти вгадав з другої спроби')
               document.write(`Молодець! Ти вгадав з другої спроби! Я загадав число ${randomNumber}`)
            }
            else {
               alert('Нажаль тобі не вдалося вгадати число! Спробуй зіграти ще раз!')
               document.write(`
            <p>Нажаль тобі не вдалося вгадати число!</p>
            <p>Я загадав число ${randomNumber}</p>
            <p>Твоя перша спроба: ${numberOne}</p>
            <p>Твоя друга спроба: ${numberTwo}</p>
            `)
            }
         }
      </script>
      <a href="task3.html">
         <p>Грати ще раз</p>
      </a>
      <a href="../index.html">👈 Назад</a>
   </body>

</html>
