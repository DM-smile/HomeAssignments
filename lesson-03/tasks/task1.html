<!DOCTYPE html>
<html lang="en">

   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Рішення задачі №1</title>
   </head>

   <body>
      <h1>Рішення задачі №1</h1>
      <p>З клавіатури вводяться імена двох дітей та кількість у них цукерок. Вивести не екран ім’я тієї дитини, у якої
         кількість цукерок є більшою, або вивести, що кількість однакова.</p>
      <p>Рішення:</p>
      <script>
         "use strict"
         const firstChild = prompt("'Введи ім'я першої дитини'", '')
         const secondChild = prompt("'Введи ім'я другої дитини'", '')
         const numberCandiesFirstChild = parseInt('Скільки було цукерок у першої дитини?', '12')
         const numberCandiesSecondChild = parseInt('Скільки було цукерок у другої дитини?', '7')
         document.write(`<p>Отже, нам відомо що ${firstChild} має ${numberCandiesFirstChild} цукерок, а ${secondChild} має ${numberCandiesSecondChild} цукерок</p>`)
            

      </script>
      <a href="../index.html"> 👈 Назад</a>
   </body>

</html>
