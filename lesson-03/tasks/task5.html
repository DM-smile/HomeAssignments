<!DOCTYPE html>
<html lang="en">

   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="shortcut icon" href="../../img/icons/favicon.png" type="image/x-icon">
      <title>Рішення задачі №5</title>
   </head>

   <body>
      <h1>Рішення задачі №5</h1>
      <p>З клавіатури вводиться назва категорії водія (А-мотоцикл, В-легковий автомобіль, С-вантажний автомобіль).
         Вивести на екран назву транспортного засобу, яким він може керувати.</p>
      <p>Рішення:</p>
      <script>
         let category = prompt('Введіть Вашу поточну категорію водія')
         if ((category === 'a') || (category === 'A') || (category === 'а') || (category === 'А')) {
            category = 'A'
            document.write(`Ваша категорія водія "${category}"`)
            document.write("<p>Права категорії А дають Вам право керувати дво- і триколісними транспортними засобами з двигуном 50 см³ включно і більше (або 4 кВт і більше, якщо це електродвигун). Це мотоцикли (в тому числі з боковим причепом), більш потужні скутери та моторолери.</p>")
         }
         else if ((category === 'b') || (category === 'B') || (category === 'в') || (category === 'В')) {
            category = 'B'
            document.write(`Ваша категорія водія "${category}"`)
            document.write("<p>Права категорії B дають Вам право керувати автомобілями масою до 3500 кг і з кількістю пасажирських місць до 8 (не рахуючи водія). Сюди входять легкові автомобілі, «легкі» вантажні авто, мінівени.</p>")
         }
         else if ((category === 'c') || (category === 'C') || (category === 'с') || (category === 'С')) {
            category = 'C'
            document.write(`Ваша категорія водія "${category}"`)
            document.write("<p>Права категорії C дають Вам право керувати вантажівками з масою понад 7.5 тонн.</p>")
         }
         else {
            document.write('Некоректно введені дані категорії, спробуйте ще раз')
         }
      </script>
      <a href="task5.html">
         <p>Ввести дані ще раз</p>
      </a>
      <a href="../index.html">👈 Назад</a>
   </body>

</html>
